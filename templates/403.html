<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无权访问 - 企业工作流管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f4f9;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .box {
            text-align: center;
            max-width: 400px;
            padding: 20px;
        }
        .icon-wrap {
            width: 80px; height: 80px;
            background: #fee2e2;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .icon-wrap i { font-size: 36px; color: #dc2626; }
        h2 { font-size: 22px; font-weight: 700; color: #1a202c; margin-bottom: 10px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon-wrap">
            <i class="bi bi-shield-x"></i>
        </div>
        <h2>无权访问</h2>
        <p>您没有权限访问管理后台，该区域仅限管理员使用。</p>
        <a href="/workflow/" class="btn btn-primary px-4" style="border-radius:8px;">返回工作台</a>
    </div>
</body>
</html>
