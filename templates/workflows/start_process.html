{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7 col-md-9">
        <div class="card">
            <div class="card-header">
                <span><i class="bi bi-file-earmark-plus me-2 text-primary"></i>填写申请信息</span>
            </div>
            <div class="card-body-padded" style="padding: 24px;">
                <form method="post" enctype="multipart/form-data" id="uploadForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">选择流程 <span class="text-danger">*</span></label>
                        <select name="process_id" class="form-select" required>
                            <option value="">请选择审批流程</option>
                            {% for process in processes %}
                            <option value="{{ process.id }}">{{ process.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">申请标题 <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control" placeholder="请输入申请标题" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">客户姓名</label>
                            <input type="text" name="customer_name" class="form-control" placeholder="请输入客户姓名">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">客户联系方式</label>
                            <input type="text" name="customer_phone" class="form-control" placeholder="电话或微信">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">房屋地址</label>
                        <input type="text" name="house_address" class="form-control" placeholder="请输入房屋详细地址">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">申请内容</label>
                        <textarea name="content" class="form-control" rows="4" placeholder="请详细描述申请内容"></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">上传附件</label>
                        <input type="file" id="fileInput" name="attachments" multiple
                            accept=".doc,.docx,.xls,.xlsx,.ppt,.pptx,.pdf,.txt,.png,.jpg,.jpeg"
                            style="display:none">
                        <div id="dropZone" class="rounded p-4 text-center" style="border: 2px dashed #c8d8ea; cursor: pointer; transition: all 0.2s; background:#f8fafc;">
                            <i class="bi bi-cloud-upload" style="font-size:28px; color:#94a3b8;"></i>
                            <p class="mb-1 mt-2" style="color:#64748b;">拖拽文件到此处，或 <span style="color:#2d6cb4; text-decoration:underline;">点击选择</span></p>
                            <small class="text-muted">支持 Word、Excel、PPT、PDF、图片，单个不超过 50MB</small>
                        </div>
                        <div id="fileList" class="mt-2"></div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary" style="padding:11px;">
                            <i class="bi bi-send me-2"></i>提交申请
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
#dropZone.drag-over { background: #eff6ff !important; border-color: #2d6cb4 !important; }
</style>
<script>
let selectedFiles = new DataTransfer();
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', function(e) { addFiles(e.target.files); e.target.value = ''; });

function addFiles(files) {
    for (let file of files) {
        if (file.size > 50 * 1024 * 1024) { alert(`"${file.name}" 超过50MB限制`); continue; }
        let dup = false;
        for (let f of selectedFiles.files) { if (f.name === file.name && f.size === file.size) { dup = true; break; } }
        if (!dup) selectedFiles.items.add(file);
    }
    fileInput.files = selectedFiles.files;
    renderFileList();
}

function renderFileList() {
    const list = document.getElementById('fileList');
    list.innerHTML = '';
    if (!selectedFiles.files.length) return;
    const header = document.createElement('p');
    header.className = 'text-muted small mb-2';
    header.textContent = `已选择 ${selectedFiles.files.length} 个文件：`;
    list.appendChild(header);
    for (let i = 0; i < selectedFiles.files.length; i++) {
        const file = selectedFiles.files[i];
        const size = (file.size / 1024 / 1024).toFixed(2);
        const item = document.createElement('div');
        item.className = 'd-flex justify-content-between align-items-center rounded p-2 mb-1';
        item.style = 'background:#f8fafc; border: 1px solid #e8edf5;';
        item.innerHTML = `<div><i class="bi bi-paperclip me-1 text-muted"></i><span>${file.name}</span><small class="text-muted ms-2">${size} MB</small></div>
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeFile(${i})">删除</button>`;
        list.appendChild(item);
    }
}

function removeFile(index) {
    let n = new DataTransfer();
    for (let i = 0; i < selectedFiles.files.length; i++) { if (i !== index) n.items.add(selectedFiles.files[i]); }
    selectedFiles = n;
    fileInput.files = selectedFiles.files;
    renderFileList();
}
</script>
{% endblock %}
