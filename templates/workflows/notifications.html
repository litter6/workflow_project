{% extends 'base.html' %}
{% block content %}
<div class="card">
    <div class="card-header">
        <span><i class="bi bi-bell me-2"></i>我的通知</span>
    </div>
    <div class="card-body">
        {% if notifications %}
        <div class="d-flex flex-column gap-2" style="padding:12px 0;">
            {% for notif in notifications %}
            <a href="{% if notif.quotation %}{% url 'quotation_detail' notif.quotation.id %}{% elif notif.instance %}{% url 'instance_detail' notif.instance.id %}{% else %}#{% endif %}" class="text-decoration-none">
                <div class="d-flex align-items-start gap-3 px-4 py-3 rounded" style="background:{% if not notif.is_read %}#eff6ff{% else %}#fafbfd{% endif %}; border:1px solid {% if not notif.is_read %}#bfdbfe{% else %}#eef1f7{% endif %}; transition:background 0.15s;">
                    <div style="width:36px;height:36px;border-radius:50%;background:{% if not notif.is_read %}#dbeafe{% else %}#f1f5f9{% endif %};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i class="bi bi-bell-fill" style="color:{% if not notif.is_read %}#2563eb{% else %}#94a3b8{% endif %};font-size:15px;"></i>
                    </div>
                    <div class="flex-grow-1">
                        <div style="color:#1a202c;font-size:14px;">{{ notif.message }}</div>
                        <div style="color:#94a3b8;font-size:12px;margin-top:3px;">{{ notif.created_at|date:"Y-m-d H:i" }}</div>
                    </div>
                    {% if not notif.is_read %}
                    <span style="width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0;margin-top:6px;"></span>
                    {% endif %}
                </div>
            </a>
            {% endfor %}
        </div>
        {% else %}
        <div class="empty-state">
            <i class="bi bi-bell-slash"></i>
            <p>暂无通知</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
